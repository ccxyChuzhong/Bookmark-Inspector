<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扩展设置</title>
  <link rel="stylesheet" href="./css/bootstrap-icons.css">
  <link rel="stylesheet" href="./css/settings.css">
</head>
<body>
  <div class="grain-overlay" aria-hidden="true"></div>

  <div class="settings-wrapper">
    <header class="settings-header">
      <div class="settings-header-inner">
        <div class="settings-header-brand">
          <div class="settings-header-icon">
            <i class="bi bi-bookmark-star-fill"></i>
          </div>
          <div>
            <h1>扩展设置</h1>
            <span class="settings-subtitle">Bookmark Inspector</span>
          </div>
        </div>
      </div>
    </header>

    <form id="settingsForm">
      <section class="settings-section">
        <div class="section-header">
          <div class="section-icon"><i class="bi bi-shield-lock"></i></div>
          <h2 class="section-title">代理设置</h2>
        </div>
        <div class="toggle-row">
          <div class="toggle-info">
            <span class="toggle-label">代理重试</span>
            <span class="toggle-desc">直连检测失败后自动通过代理重试</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="enableProxyRetry">
            <span class="toggle-track"></span>
          </label>
        </div>

        <div id="proxyFields" class="proxy-fields">
          <div class="field-group">
            <label for="proxyAddress">代理地址</label>
            <input type="text" id="proxyAddress" placeholder="如 127.0.0.1">
          </div>
          <div class="field-group">
            <label for="proxyPort">端口</label>
            <input type="number" id="proxyPort" placeholder="如 7890" min="1" max="65535">
          </div>
          <div class="field-group proxy-type-field">
            <label for="proxyType">类型</label>
            <div id="proxyType" class="proxy-type-group" role="radiogroup" aria-label="代理类型">
              <label class="proxy-type-option">
                <input type="radio" name="proxyType" value="http">
                <span>HTTP</span>
              </label>
              <label class="proxy-type-option">
                <input type="radio" name="proxyType" value="https">
                <span>HTTPS</span>
              </label>
              <label class="proxy-type-option">
                <input type="radio" name="proxyType" value="socks5">
                <span>SOCKS5</span>
              </label>
            </div>
          </div>
        </div>
        <p class="hint-text"><i class="bi bi-info-circle"></i> 代理仅在直连失败后才会尝试</p>
      </section>

      <section class="settings-section">
        <div class="section-header">
          <div class="section-icon"><i class="bi bi-lightning-charge"></i></div>
          <h2 class="section-title">并发检测</h2>
        </div>
        <div class="field-group">
          <label for="threadsPerBatch">每批检测数量</label>
          <input type="number" id="threadsPerBatch" min="1" max="20" placeholder="建议 5 ~ 15">
        </div>
        <p class="hint-text"><i class="bi bi-info-circle"></i> 根据网络和机器性能，建议设置在 5 到 15 之间</p>
      </section>

      <section class="settings-section">
        <div class="section-header">
          <div class="section-icon"><i class="bi bi-cloud-arrow-up"></i></div>
          <h2 class="section-title">WebDAV 同步</h2>
        </div>
        <div class="field-group">
          <label for="webdavUrl">服务器地址</label>
          <input type="url" id="webdavUrl" placeholder="如 https://dav.jianguoyun.com/dav/">
        </div>
        <div class="webdav-auth-fields">
          <div class="field-group">
            <label for="webdavUsername">用户名</label>
            <input type="text" id="webdavUsername" placeholder="WebDAV 用户名">
          </div>
          <div class="field-group">
            <label for="webdavPassword">密码</label>
            <input type="password" id="webdavPassword" placeholder="WebDAV 密码">
          </div>
        </div>
        <div class="field-group">
          <label for="webdavPath">远程路径</label>
          <input type="text" id="webdavPath" placeholder="如 /bookmarks/" value="/bookmarks/">
        </div>

        <div class="sync-info-card">
          <div class="sync-info-row">
            <span class="sync-info-label">远端备份时间</span>
            <span id="remoteBackupTime" class="sync-info-value">未查询</span>
          </div>
          <div class="sync-info-row">
            <span class="sync-info-label">最近从远端拉取</span>
            <span id="lastPulledTime" class="sync-info-value">暂无记录</span>
          </div>
          <div class="sync-info-row">
            <span class="sync-info-label">最近备份到远端</span>
            <span id="lastPushedTime" class="sync-info-value">暂无记录</span>
          </div>
        </div>

        <div class="webdav-actions">
          <button type="button" id="testWebdavBtn" class="ghost-btn">
            <i class="bi bi-plug"></i> 测试连接
          </button>
          <button type="button" id="queryWebdavBtn" class="ghost-btn">
            <i class="bi bi-search"></i> 查询远端
          </button>
          <button type="button" id="webdavBackupBtn" class="ghost-btn">
            <i class="bi bi-cloud-arrow-up"></i> 备份
          </button>
          <button type="button" id="webdavRestoreBtn" class="ghost-btn">
            <i class="bi bi-cloud-arrow-down"></i> 恢复
          </button>
        </div>
        <div id="webdavTestResult" class="message"></div>
        <p class="hint-text"><i class="bi bi-info-circle"></i> 支持标准 WebDAV 协议的网盘服务</p>
      </section>

      <section class="settings-section settings-actions">
        <button type="submit" class="primary-btn">
          <i class="bi bi-check2"></i> 保存设置
        </button>
        <div id="settingsMessage" class="message"></div>
      </section>
    </form>
  </div>

  <script src="./js/webdav.js"></script>
  <script src="./js/settings.js"></script>
</body>
</html>
